name: Auto Commit
on:
  workflow_dispatch:
  schedule:
    - cron: '23 1 27 3 *'
    - cron: '26 7 27 3 *'
    - cron: '48 12 27 3 *'
    - cron: '4 19 27 3 *'
    - cron: '40 1 28 3 *'
    - cron: '6 5 28 3 *'
    - cron: '22 8 28 3 *'
    - cron: '6 12 28 3 *'
    - cron: '45 16 28 3 *'
    - cron: '8 0 29 3 *'
    - cron: '49 13 29 3 *'
    - cron: '46 0 30 3 *'
    - cron: '10 4 30 3 *'
    - cron: '52 6 30 3 *'
    - cron: '17 9 30 3 *'
    - cron: '0 13 30 3 *'
    - cron: '20 16 30 3 *'
    - cron: '21 18 30 3 *'
    - cron: '28 1 31 3 *'
    - cron: '6 2 31 3 *'
    - cron: '14 5 31 3 *'
    - cron: '33 7 31 3 *'
    - cron: '7 8 31 3 *'
    - cron: '2 11 31 3 *'
    - cron: '18 13 31 3 *'
    - cron: '25 14 31 3 *'
    - cron: '44 16 31 3 *'
    - cron: '3 19 31 3 *'
    - cron: '57 0 1 4 *'
    - cron: '9 4 1 4 *'
    - cron: '45 9 1 4 *'
    - cron: '32 13 1 4 *'
    - cron: '31 16 1 4 *'
    - cron: '21 20 1 4 *'
    - cron: '26 0 2 4 *'
    - cron: '57 7 2 4 *'
    - cron: '10 13 2 4 *'
    - cron: '31 19 2 4 *'

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
      - name: Set Git Identity
        run: |
          git config --global user.name "Arjun Agnihotri"
          git config --global user.email "arjunagnihotrikanpur@users.noreply.github.com"

      - name: Create Single Change
        run: |
          node ./auto_commit_script.js
          git add .
          git commit -m "Auto commit [$(date -u)]"
          git push